apiVersion: v1
kind: Service
metadata:
  name: course-app-service
  labels:
    app: course-app
spec:
  type: NodePort
  selector:
    app: course-app
  ports:
    - name: http
      protocol: TCP
      port: 8080        # порт всередині кластера
      targetPort: 8080  # порт контейнера
      nodePort: 30080   # зовнішній порт вузла (діапазон 30000–32767)

