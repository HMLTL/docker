apiVersion: v1
kind: Service
metadata:
  name: course-app-service
  labels:
    app: course-app
spec:
  type: NodePort
  selector:
    app: course-app       # балансує трафік між усіма 10+ репліками автоматично
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080

