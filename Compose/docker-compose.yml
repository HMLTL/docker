services:
  course-app:
    build:
      context: ./apps/course-app
      dockerfile: Dockerfile
    image: course-app:local
    container_name: course-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_STORE: redis
      APP_REDIS_URL: redis://redis:6379/0
      APP_HOST: 0.0.0.0
      APP_PORT: "8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    networks:
      - course-net

  redis:
    image: redis:7-alpine
    container_name: course-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - course-net

volumes:
  redis-data:

networks:
  course-net:
    driver: bridge
